<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlimeMorph</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:"Segoe UI",sans-serif;}
#c{position:fixed;top:0;left:0;width:100vw;height:100vh;display:block;z-index:0;pointer-events:none;}
#hud{position:fixed;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:center;z-index:10;pointer-events:none;}
#hp-display{color:#7fff7f;font-size:13px;font-weight:700;background:rgba(0,0,0,.75);padding:5px 14px;border-radius:20px;border:1px solid #3a3;}
.fb{width:40px;height:40px;border-radius:9px;border:2px solid #444;background:rgba(0,0,0,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:17px;color:#666;cursor:pointer;pointer-events:all;position:relative;}
.fb.ul{border-color:#7fff7f;color:#7fff7f;}
.fb.ac{border-color:#fff;background:rgba(127,255,127,.22);color:#fff;box-shadow:0 0 10px #7fff7f88;}
.fb .k{position:absolute;bottom:1px;right:2px;font-size:7px;color:#777;}
#msg{position:fixed;top:58px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.92);color:#ffe87f;padding:6px 16px;border-radius:18px;border:1px solid #aa8;font-size:12px;z-index:20;opacity:0;transition:opacity .4s;pointer-events:none;max-width:90vw;text-align:center;}
#btn-fs{position:fixed;bottom:12px;right:12px;z-index:50;background:rgba(0,0,0,.75);border:2px solid #555;color:#bbb;font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer;}
#btn-fs:hover{border-color:#7fff7f;color:#7fff7f;}
#ov{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.92);z-index:30;padding:20px;text-align:center;}
#ov h1{font-size:clamp(26px,5vw,52px);color:#7fff7f;letter-spacing:3px;text-shadow:0 0 24px #4f4;margin-bottom:8px;}
#ov p{color:#aaa;font-size:clamp(10px,2vw,14px);margin:3px 0;line-height:1.6;}
.sb{margin-top:20px;padding:14px 44px;background:#2a6a2a;color:#7fff7f;border:2px solid #4a4;border-radius:28px;font-size:18px;cursor:pointer;letter-spacing:2px;}
.cbox{margin-top:14px;background:rgba(0,0,0,.5);border:1px solid #444;border-radius:14px;padding:12px 28px;color:#aaa;font-size:13px;line-height:2.2;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="hp-display">❤️ <span id="hpn">6</span>/6</div>
  <div style="display:flex;gap:6px;pointer-events:all;">
    <div class="fb" id="f0" onclick="setForm('normal')">🟢<span class="k">1</span></div>
    <div class="fb" id="f1" onclick="setForm('spring')">🌀<span class="k">2</span></div>
    <div class="fb" id="f2" onclick="setForm('boat')">⛵<span class="k">3</span></div>
    <div class="fb" id="f3" onclick="setForm('shield')">🛡️<span class="k">4</span></div>
  </div>
</div>
<div id="msg"></div>
<button id="btn-fs" onclick="toggleFS()">⛶ Tela Cheia (F11)</button>
<div id="ov">
  <h1>SlimeMorph</h1>
  <p>Encontre <b style="color:#ffd700">📖 livros</b> para desbloquear formas</p>
  <p style="margin-top:4px;color:#f88">⚠️ Água tóxica causa dano &nbsp;|&nbsp; 🌋 Lava = morte instantânea</p>
  <p style="color:#fa8">🏹 Arqueiros atiram a cada 4s!</p>
  <div class="cbox">
    <b style="color:#7fff7f">Controles:</b><br>
    <b style="color:#fff">A / D</b> — Mover &nbsp;|&nbsp; <b style="color:#fff">Espaço</b> — Pular<br>
    <b style="color:#fff">1/2/3/4</b> — Forma &nbsp;|&nbsp; <b style="color:#fff">R</b> — Reiniciar
  </div>
  <button class="sb" onclick="startGame()">▶ JOGAR</button>
  <p style="margin-top:10px;color:#555;font-size:12px">ou pressione qualquer tecla</p>
</div>
<script>
// ── CANVAS ──────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const GW=900,GH=480;
canvas.width=GW; canvas.height=GH;
canvas.style.width='100vw'; canvas.style.height='100vh';

// ── FULLSCREEN ──────────────────────────────────────────
function toggleFS(){
  const fs=document.fullscreenElement||document.webkitFullscreenElement;
  const btn=document.getElementById('btn-fs');
  if(!fs){
    (document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen).call(document.documentElement).catch(()=>{});
    if(btn)btn.textContent='✕ Sair';
  }else{
    (document.exitFullscreen||document.webkitExitFullscreen).call(document).catch(()=>{});
    if(btn)btn.textContent='⛶ Tela Cheia (F11)';
  }
}
document.addEventListener('fullscreenchange',()=>{
  const btn=document.getElementById('btn-fs');
  if(btn)btn.textContent=document.fullscreenElement?'✕ Sair':'⛶ Tela Cheia (F11)';
});

// ── INPUT ───────────────────────────────────────────────
const keys={};
const ovEl=document.getElementById('ov');

window.addEventListener('keydown',function(e){
  keys[e.code]=true;
  // F11 = tela cheia
  if(e.code==='F11'){e.preventDefault();toggleFS();return;}
  // Qualquer tecla no menu inicia o jogo
  if(ovEl.style.display!=='none'){
    e.preventDefault();
    startGame();
    return;
  }
  // Controles em jogo
  if(e.code==='Digit1')setForm('normal');
  if(e.code==='Digit2')setForm('spring');
  if(e.code==='Digit3')setForm('boat');
  if(e.code==='Digit4')setForm('shield');
  if(e.code==='KeyR')startGame();
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
});
window.addEventListener('keyup',function(e){keys[e.code]=false;});

const isL=()=>keys['ArrowLeft']||keys['KeyA'];
const isR=()=>keys['ArrowRight']||keys['KeyD'];
const isJ=()=>keys['Space']||keys['ArrowUp']||keys['KeyZ'];

// ── PALETTE ─────────────────────────────────────────────
const C={
  sky1:'#0d0d2b',sky2:'#1a1040',
  ground:'#2a1f3d',groundTop:'#3d2e5c',
  platform:'#2d3561',platformTop:'#4a5a9a',
  slime:'#4dff6e',slimeDark:'#1aaa3a',
  spring:'#ffcc00',
  boat:'#c88040',boatDark:'#7a4a20',sail:'#ffe0b0',
  shield:'#80c0ff',
  enemy:'#ff3030',enemyDark:'#aa0000',
  archer:'#cc44ff',archerDark:'#7700aa',
  arrow:'#ffcc44',
  book:'#ffd700',bookSpine:'#cc9900',
};

// ── STATE ───────────────────────────────────────────────
let game,animFrame;

function mkGame(){
  return{
    running:false,tick:0,cam:{x:0},
    player:mkPlayer(),arrows:[],particles:[],
    forms:{normal:true,spring:false,boat:false,shield:false},
    hp:6,maxHp:6,inv:0,wdt:0,safeX:80,
    level:buildLevel(),
  };
}
function mkPlayer(){
  return{x:80,y:360,vx:0,vy:0,w:36,h:32,
    onG:false,form:'normal',sy:1,sx:1,face:1,
    jb:0,coy:0,inW:false,inL:false};
}

// ── LEVEL ───────────────────────────────────────────────
function buildLevel(){
  const P=[
    {x:0,y:430,w:510,h:20,t:'g'},{x:60,y:390,w:80,h:14,t:'p'},
    {x:190,y:345,w:120,h:14,t:'p'},{x:360,y:310,w:90,h:14,t:'p'},
    {x:440,y:370,w:80,h:14,t:'p'},
    {x:510,y:430,w:60,h:20,t:'g'},{x:580,y:280,w:100,h:14,t:'p'},
    {x:700,y:220,w:110,h:14,t:'p'},{x:820,y:270,w:100,h:14,t:'p'},
    {x:870,y:390,w:60,h:14,t:'p'},
    {x:930,y:430,w:300,h:20,t:'g'},{x:960,y:360,w:130,h:14,t:'p'},
    {x:1230,y:418,w:55,h:20,t:'g'},{x:1380,y:418,w:55,h:20,t:'g'},
    {x:1530,y:418,w:55,h:20,t:'g'},{x:1680,y:418,w:55,h:20,t:'g'},
    {x:1830,y:418,w:55,h:20,t:'g'},{x:1980,y:418,w:55,h:20,t:'g'},
    {x:2050,y:430,w:400,h:20,t:'g'},{x:2070,y:360,w:140,h:14,t:'p'},
    {x:2260,y:360,w:90,h:14,t:'p'},
    {x:2550,y:430,w:100,h:20,t:'g'},{x:2560,y:340,w:90,h:14,t:'p'},
    {x:2670,y:280,w:110,h:14,t:'p'},{x:2790,y:340,w:90,h:14,t:'p'},
    {x:2860,y:430,w:80,h:20,t:'g'},
    {x:3060,y:430,w:80,h:20,t:'g'},{x:3070,y:340,w:90,h:14,t:'p'},
    {x:3170,y:270,w:100,h:14,t:'p'},{x:3270,y:200,w:130,h:14,t:'p'},
  ];
  const waters=[{x:1230,y:380,w:850,h:60}];
  const lavas=[{x:2450,y:400,w:100,h:40},{x:2940,y:400,w:120,h:40},{x:3155,y:400,w:105,h:40}];
  const books=[
    {x:222,y:323,form:'spring',label:'Livro da Mola',col:false,bob:0},
    {x:982,y:338,form:'boat',label:'Livro do Barco',col:false,bob:0},
    {x:2092,y:338,form:'shield',label:'Livro do Escudo',col:false,bob:0},
  ];
  const enemies=[
    mke(300,405),mke(430,405),mke(600,255),mke(715,195),
    mke(1240,393),mke(1540,393),mke(1840,393),
    mke(2120,405),mke(2280,405),mke(2570,405),mke(2700,405),
    mke(3080,405),mke(3180,245),
  ];
  const archers=[
    mka(820,244,-1),mka(1390,393,-1),mka(1690,393,1),
    mka(2270,334,-1),mka(2680,254,-1),mka(2800,314,1),
    mka(3080,314,-1),mka(3180,244,1),
  ];
  return{platforms:P,waters,lavas,books,enemies,archers,goal:{x:3320,y:168,w:40,h:32},width:3400};
}
function mke(x,y){return{x,y,w:28,h:28,vx:(Math.random()>.5?1:-1)*.8,vy:0,onG:false,alert:0,dead:false};}
function mka(x,y,d){return{x,y,w:28,h:30,face:d,st:Math.floor(Math.random()*240),dead:false,vy:0,onG:false};}

// ── UI ──────────────────────────────────────────────────
let msgT;
function showMsg(t,d=2800){
  const el=document.getElementById('msg');
  el.textContent=t;el.style.opacity=1;
  clearTimeout(msgT);msgT=setTimeout(()=>el.style.opacity=0,d);
}
function updHP(){document.getElementById('hpn').textContent=game.hp;}
function setForm(f){
  if(!game||!game.running)return;
  if(!game.forms[f])return showMsg('Forma ainda bloqueada!');
  if(game.player.form===f)return;
  game.player.form=f;
  boom(game.player.x+18,game.player.y+16,C.slime,12);
  updFUI();
}
function updFUI(){
  ['normal','spring','boat','shield'].forEach((f,i)=>{
    const b=document.getElementById('f'+i);
    if(b)b.className='fb'+(game.forms[f]?' ul':'')+(game.player.form===f?' ac':'');
  });
}

// ── PARTICLES ───────────────────────────────────────────
function boom(x,y,col,n=8,sp=3){
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n+Math.random()*.5,s=sp*(.5+Math.random());
    game.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col});
  }
}

// ── PHYSICS ─────────────────────────────────────────────
const ov2=(a,b)=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
function col(p,pl){
  if(p.x+p.w<=pl.x||p.x>=pl.x+pl.w||p.y+p.h<=pl.y||p.y>=pl.y+pl.h)return 0;
  if(p.y+p.h-p.vy<=pl.y+6&&p.vy>=0){p.y=pl.y-p.h;p.vy=0;p.onG=true;return 1;}
  if(p.x+p.w-p.vx<=pl.x+4){p.x=pl.x-p.w;p.vx=0;return 2;}
  if(p.x-p.vx>=pl.x+pl.w-4){p.x=pl.x+pl.w;p.vx=0;return 3;}
  p.y=pl.y+pl.h;p.vy=0;return 4;
}

// ── GAME LOOP ────────────────────────────────────────────
function startGame(){
  ovEl.style.display='none';
  game=mkGame();game.running=true;
  updFUI();updHP();
  if(animFrame)cancelAnimationFrame(animFrame);
  loop();
}
function loop(){update();draw();animFrame=requestAnimationFrame(loop);}

let _jh=false;
function update(){
  if(!game||!game.running)return;
  const G=game,p=G.player;G.tick++;
  const isSp=p.form==='spring',isBo=p.form==='boat',isSh=p.form==='shield';

  p.inW=false;p.inL=false;
  for(const w of G.level.waters)if(ov2(p,w)){p.inW=true;break;}
  for(const lv of G.level.lavas)if(ov2(p,lv)){p.inL=true;break;}

  if(p.inL){boom(p.x+18,p.y+16,'#ff5500',18,6);instadie();return;}

  if(p.inW&&!isBo){
    G.wdt++;
    if(G.wdt===1)showMsg('☠️ Água tóxica! Vire barco ⛵!',3200);
    if(G.wdt%60===0){takeDmg(1);p.x=G.safeX;p.y=300;p.vx=0;p.vy=0;}
  }else{G.wdt=0;}

  const spd=isSh?2.2:3.4,acc=p.onG?.55:.25,fri=p.onG?.78:.92;
  const grv=p.inW&&isBo?.08:.42,jp=isSp?-14.5:isBo?-6:-9;
  if(isL()){p.vx-=acc;p.face=-1;}
  if(isR()){p.vx+=acc;p.face=1;}
  if(!isL()&&!isR())p.vx*=fri;
  p.vx=Math.max(-spd,Math.min(spd,p.vx));
  if(p.jb>0)p.jb--;if(p.coy>0)p.coy--;
  const jn=isJ();if(jn&&!_jh){p.jb=8;_jh=true;}if(!jn)_jh=false;
  if(p.jb>0&&(p.onG||p.coy>0||(p.inW&&isBo))){
    p.vy=jp;p.jb=0;p.coy=0;p.sy=.6;p.sx=1.4;
    if(isSp)boom(p.x+18,p.y+32,C.spring,6,4);
  }
  if(p.inW&&isBo)p.vy=p.vy*.85+grv;else{p.vy+=grv;p.vy=Math.min(p.vy,16);}
  p.x+=p.vx;p.y+=p.vy;p.x=Math.max(0,p.x);
  const wG=p.onG;p.onG=false;
  for(const pl of G.level.platforms)col(p,pl);
  if(wG&&!p.onG)p.coy=6;
  if(p.onG&&!p.inW)G.safeX=p.x;
  if(p.y>GH+80){takeDmg(1);p.x=G.safeX;p.y=300;p.vx=0;p.vy=0;}
  p.sy+=(1-p.sy)*.18;p.sx+=(1-p.sx)*.18;
  if(G.inv>0)G.inv--;

  for(const bk of G.level.books){
    if(bk.col)continue;
    bk.bob+=.05;
    if(ov2(p,{x:bk.x,y:bk.y-4+Math.sin(bk.bob)*4,w:20,h:24})){
      bk.col=true;G.forms[bk.form]=true;
      boom(bk.x+10,bk.y+12,C.book,16,5);
      showMsg('📖 "'+bk.label+'" desbloqueado!',4000);updFUI();
    }
  }

  for(const en of G.level.enemies){
    if(en.dead)continue;
    const d=Math.abs(p.x-en.x);
    if(d<300){en.alert=40;en.vx=(p.x>en.x?1:-1)*1.4;}
    else if(en.alert>0)en.alert--;
    else{en.vx+=Math.random()*.4-.2;en.vx=Math.max(-.9,Math.min(.9,en.vx));}
    en.vy+=.42;en.x+=en.vx;en.y+=en.vy;en.onG=false;
    for(const pl of G.level.platforms)col(en,pl);
    en.x=Math.max(0,Math.min(G.level.width-en.w,en.x));
    if(G.inv===0&&ov2(p,en)){
      if(isSh){en.dead=true;boom(en.x+14,en.y+14,C.enemy,14,5);showMsg('🛡️ Escudo destruiu inimigo!');}
      else if(p.vy>0&&p.y+p.h<en.y+en.h*.6){en.dead=true;p.vy=-7;boom(en.x+14,en.y,C.enemy,10,4);}
      else takeDmg(1);
    }
  }

  for(const ar of G.level.archers){
    if(ar.dead)continue;
    ar.vy+=.42;ar.y+=ar.vy;ar.onG=false;
    for(const pl of G.level.platforms)col(ar,pl);
    ar.st=(ar.st||0)+1;
    if(ar.st>=240){
      ar.st=0;ar.face=p.x>ar.x?1:-1;
      G.arrows.push({x:ar.x+(ar.face>0?ar.w:0),y:ar.y+ar.h/2-3,vx:ar.face*5.5,vy:-.5,w:16,h:5,life:1});
    }
  }

  for(let i=G.arrows.length-1;i>=0;i--){
    const ar=G.arrows[i];
    ar.x+=ar.vx;ar.y+=ar.vy;ar.vy+=.06;ar.life-=.004;
    let hit=false;
    for(const pl of G.level.platforms)if(ov2(ar,pl)){hit=true;break;}
    if(hit||ar.life<=0||ar.x<G.cam.x-50||ar.x>G.cam.x+GW+50){G.arrows.splice(i,1);continue;}
    if(G.inv===0&&ov2(p,ar)){
      G.arrows.splice(i,1);
      if(isSh){boom(p.x+18,p.y,C.shield,6,3);showMsg('🛡️ Flecha bloqueada!');}
      else takeDmg(3);
    }
  }

  if(ov2(p,G.level.goal)){G.running=false;showOv('🎉 Você Venceu!','Parabéns! SlimeMorph completou o desafio!',true);}

  for(let i=G.particles.length-1;i>=0;i--){
    const pt=G.particles[i];
    pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=.15;pt.life-=.035;
    if(pt.life<=0)G.particles.splice(i,1);
  }

  const tgt=p.x-GW/3;
  G.cam.x+=(tgt-G.cam.x)*.1;
  G.cam.x=Math.max(0,Math.min(G.level.width-GW,G.cam.x));
}

function takeDmg(n){
  if(game.inv>0)return;
  game.hp=Math.max(0,game.hp-n);game.inv=90;
  boom(game.player.x+18,game.player.y+16,'#ff4444',10,4);updHP();
  if(game.hp<=0)instadie();
}
function instadie(){game.running=false;showOv('💀 Game Over','O SlimeMorph foi derrotado...',false);}
function showOv(title,sub,won){
  ovEl.innerHTML='<h1 style="color:'+(won?'#7fff7f':'#ff6666')+'">'+title+'</h1><p style="color:#ccc;margin-top:10px">'+sub+'</p><button class="sb" onclick="startGame()">▶ JOGAR NOVAMENTE</button><p style="margin-top:10px;color:#555;font-size:12px">ou pressione qualquer tecla</p>';
  ovEl.style.display='flex';
}

// ── DRAW ────────────────────────────────────────────────
function draw(){
  if(!game)return;
  const G=game,cx=Math.round(G.cam.x);
  const sg=ctx.createLinearGradient(0,0,0,GH);
  sg.addColorStop(0,C.sky1);sg.addColorStop(1,C.sky2);
  ctx.fillStyle=sg;ctx.fillRect(0,0,GW,GH);
  for(let i=0;i<55;i++){
    ctx.globalAlpha=(Math.sin(G.tick*.02+i)*.3+.7)*.45;
    ctx.fillStyle='#fff';ctx.fillRect((i*137+cx*.05)%GW,(i*89)%180,1.5,1.5);
  }
  ctx.globalAlpha=1;
  ctx.save();ctx.translate(-cx,0);

  for(const lv of G.level.lavas){
    const lg=ctx.createLinearGradient(lv.x,lv.y,lv.x,lv.y+lv.h);
    lg.addColorStop(0,'#ff6600');lg.addColorStop(1,'#aa1100');
    ctx.fillStyle=lg;ctx.fillRect(lv.x,lv.y,lv.w,lv.h);
    for(let i=0;i<lv.w;i+=20){ctx.fillStyle='rgba(255,200,0,.35)';ctx.fillRect(lv.x+i,lv.y+Math.sin(G.tick*.12+i*.18)*4,18,5);}
    ctx.font='bold 12px sans-serif';ctx.fillStyle='rgba(255,180,0,.9)';ctx.textAlign='center';
    ctx.fillText('🌋 LAVA',lv.x+lv.w/2,lv.y-4);ctx.textAlign='left';
  }

  for(const w of G.level.waters){
    const wg=ctx.createLinearGradient(w.x,w.y,w.x,w.y+w.h);
    wg.addColorStop(0,'#1aaa2a');wg.addColorStop(1,'#0a2a0a');
    ctx.fillStyle=wg;ctx.fillRect(w.x,w.y,w.w,w.h);
    for(let i=0;i<w.w;i+=20){ctx.fillStyle='rgba(50,255,80,.22)';ctx.fillRect(w.x+i,w.y+Math.sin(G.tick*.08+i*.12)*3,18,4);}
    ctx.font='bold 12px sans-serif';ctx.fillStyle='rgba(80,255,80,.8)';ctx.textAlign='center';
    ctx.fillText('☠ ÁGUA TÓXICA ☠',w.x+w.w/2,w.y+18);ctx.textAlign='left';
  }

  for(const pl of G.level.platforms){
    const g=pl.t==='g';
    ctx.fillStyle=g?C.ground:C.platform;ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
    ctx.fillStyle=g?C.groundTop:C.platformTop;ctx.fillRect(pl.x,pl.y,pl.w,4);
  }

  for(const bk of G.level.books){
    if(bk.col)continue;
    const by=bk.y+Math.sin(bk.bob)*4-4;
    ctx.save();ctx.shadowColor=C.book;ctx.shadowBlur=12;
    ctx.fillStyle=C.book;ctx.fillRect(bk.x,by,20,24);
    ctx.fillStyle=C.bookSpine;ctx.fillRect(bk.x,by,4,24);
    ctx.font='12px serif';ctx.fillText('📖',bk.x-1,by-3);ctx.restore();
  }

  const gl=G.level.goal;
  ctx.fillStyle='#ffe87f';ctx.fillRect(gl.x+18,gl.y-44,3,48);
  ctx.fillStyle='#ffaa00';
  ctx.beginPath();ctx.moveTo(gl.x+21,gl.y-44);ctx.lineTo(gl.x+42,gl.y-32);ctx.lineTo(gl.x+21,gl.y-20);ctx.fill();

  for(const en of G.level.enemies){
    if(en.dead)continue;
    ctx.save();ctx.shadowColor=C.enemy;ctx.shadowBlur=en.alert?14:4;
    ctx.fillStyle=C.enemy;ctx.fillRect(en.x,en.y,en.w,en.h);
    ctx.fillStyle=C.enemyDark;ctx.fillRect(en.x,en.y,en.w,4);ctx.fillRect(en.x,en.y+en.h-4,en.w,4);
    ctx.fillStyle='#000';ctx.fillRect(en.x+6,en.y+8,6,6);ctx.fillRect(en.x+16,en.y+8,6,6);
    ctx.fillStyle='#f00';ctx.fillRect(en.x+8,en.y+10,2,2);ctx.fillRect(en.x+18,en.y+10,2,2);
    ctx.restore();
  }

  for(const ar of G.level.archers){
    if(ar.dead)continue;
    ctx.save();ctx.shadowColor=C.archer;ctx.shadowBlur=8;
    ctx.fillStyle=C.archer;ctx.fillRect(ar.x,ar.y,ar.w,ar.h);
    ctx.fillStyle=C.archerDark;ctx.fillRect(ar.x,ar.y,ar.w,4);ctx.fillRect(ar.x,ar.y+ar.h-4,ar.w,4);
    ctx.strokeStyle='#ffcc44';ctx.lineWidth=2.5;
    const bx2=ar.x+(ar.face>0?ar.w:0);
    ctx.beginPath();ctx.arc(bx2,ar.y+ar.h/2,10,ar.face>0?-Math.PI*.6:Math.PI*.4,ar.face>0?Math.PI*.6:Math.PI*1.6);ctx.stroke();
    ctx.fillStyle='#000';ctx.fillRect(ar.x+6,ar.y+8,5,5);ctx.fillRect(ar.x+17,ar.y+8,5,5);
    ctx.restore();
  }

  for(const ar of G.arrows){
    ctx.save();ctx.shadowColor=C.arrow;ctx.shadowBlur=6;
    ctx.translate(ar.x+ar.w/2,ar.y+ar.h/2);ctx.rotate(Math.atan2(ar.vy,ar.vx));
    ctx.fillStyle=C.arrow;ctx.fillRect(-ar.w/2,-ar.h/2,ar.w,ar.h);
    ctx.restore();
  }

  for(const pt of G.particles){
    ctx.globalAlpha=pt.life;ctx.fillStyle=pt.col;
    ctx.beginPath();ctx.arc(pt.x,pt.y,4*pt.life,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // player
  const p=G.player;
  const pcx=p.x+p.w/2,pcy=p.y+p.h/2,piw=p.w*p.sx,pih=p.h*p.sy;
  ctx.save();
  if(G.inv>0&&Math.floor(G.tick/4)%2===0)ctx.globalAlpha=.35;
  if(p.form==='normal')dSlime(pcx,pcy,piw,pih,p.face,G.tick);
  else if(p.form==='spring')dSpring(pcx,pcy,piw,pih,p.face,G.tick);
  else if(p.form==='boat')dBoat(pcx,pcy,piw,pih,p.face,G.tick,p.inW);
  else if(p.form==='shield')dShield(pcx,pcy,piw,pih,p.face,G.tick);
  ctx.globalAlpha=1;ctx.restore();
  ctx.restore();

  // HP bar
  const bw=160,bh=10,bx=10,by=GH-18;
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=game.hp>3?'#4dff6e':game.hp>1?'#ffcc00':'#ff3030';
  ctx.fillRect(bx,by,bw*(game.hp/game.maxHp),bh);
  ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
}

// ── DRAW FORMS ──────────────────────────────────────────
function dSlime(cx,cy,w,h,face,t){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.18)';ctx.beginPath();ctx.ellipse(cx,cy+h/2+4,w*.45,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=C.slime;ctx.shadowColor=C.slime;ctx.shadowBlur=12;
  ctx.beginPath();ctx.ellipse(cx,cy,w/2,h/2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.42)';ctx.beginPath();ctx.ellipse(cx-w*.12,cy-h*.15,w*.11,h*.08,-.4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=C.slime;
  ctx.beginPath();ctx.moveTo(cx-4,cy+h/2-2);ctx.quadraticCurveTo(cx,cy+h/2+8+Math.sin(t*.06)*3,cx+4,cy+h/2-2);ctx.fill();
  const ex=face*w*.15;
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(cx+ex-6*face,cy-h*.05,6,7,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+ex+6*face,cy-h*.05,6,7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.ellipse(cx+ex-6*face+face,cy-h*.05,3.5,4,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+ex+6*face+face,cy-h*.05,3.5,4,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function dSpring(cx,cy,w,h,face,t){
  ctx.save();
  const ch=h/5;
  for(let i=0;i<5;i++){
    const py=cy-h/2+i*ch+ch/2,c=.9+Math.sin(t*.1)*.1;
    ctx.strokeStyle=C.spring;ctx.lineWidth=5;ctx.shadowColor=C.spring;ctx.shadowBlur=8;
    ctx.beginPath();ctx.ellipse(cx,py*c+cy*(1-c),w*.45,ch*.38,0,0,Math.PI*2);ctx.stroke();
  }
  ctx.shadowBlur=0;dSlime(cx,cy-h*.25,w*.75,h*.45,face,t);ctx.restore();
}
function dBoat(cx,cy,w,h,face,t,inW){
  ctx.save();
  const b=inW?Math.sin(t*.08)*4:0;
  ctx.fillStyle=C.boat;ctx.shadowColor=C.boat;ctx.shadowBlur=6;
  ctx.beginPath();
  ctx.moveTo(cx-w/2,cy+h*.1+b);ctx.lineTo(cx+w/2,cy+h*.1+b);
  ctx.lineTo(cx+w*.4,cy+h/2+b);ctx.lineTo(cx-w*.4,cy+h/2+b);ctx.closePath();ctx.fill();
  ctx.fillStyle=C.boatDark;ctx.fillRect(cx-w/2,cy+h*.1+b,w,5);
  ctx.strokeStyle='#6a3a10';ctx.lineWidth=3;ctx.shadowBlur=0;
  ctx.beginPath();ctx.moveTo(cx,cy+h*.1+b);ctx.lineTo(cx,cy-h*.5+b);ctx.stroke();
  ctx.fillStyle=C.sail;ctx.globalAlpha=.9;
  ctx.beginPath();ctx.moveTo(cx,cy-h*.5+b);ctx.lineTo(cx+face*w*.45+Math.sin(t*.06)*4,cy-h*.1+b);ctx.lineTo(cx,cy-h*.1+b);ctx.closePath();ctx.fill();
  ctx.globalAlpha=1;dSlime(cx,cy-h*.05+b,w*.5,h*.45,face,t);ctx.restore();
}
function dShield(cx,cy,w,h,face,t){
  ctx.save();
  ctx.save();ctx.translate(cx,cy);ctx.rotate(t*.04);
  for(let i=0;i<6;i++){
    const a=Math.PI*2*i/6;
    ctx.fillStyle=C.shield;ctx.globalAlpha=.5+Math.sin(t*.1+i)*.3;
    ctx.shadowColor=C.shield;ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(Math.cos(a)*w*.65,Math.sin(a)*h*.65,5,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();ctx.globalAlpha=1;
  ctx.fillStyle='rgba(128,192,255,.2)';ctx.strokeStyle=C.shield;ctx.lineWidth=2.5;
  ctx.shadowColor=C.shield;ctx.shadowBlur=18;
  ctx.beginPath();ctx.ellipse(cx,cy,w*.6,h*.6,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.shadowBlur=0;dSlime(cx,cy,w*.72,h*.72,face,t);ctx.restore();
}

// init preview
window.addEventListener('DOMContentLoaded',function(){
  const bg=ctx.createLinearGradient(0,0,0,GH);
  bg.addColorStop(0,'#0d0d2b');bg.addColorStop(1,'#1a1040');
  ctx.fillStyle=bg;ctx.fillRect(0,0,GW,GH);
  dSlime(GW/2,GH/2,60,52,1,0);
});
</script>
